name: Release Shelly Device Manager

on:
  push:
    branches:
      - master
    paths:
      - 'Apps/ShellyDeviceManager.groovy'
      - 'Scripts/**'
      - 'UniversalDrivers/**'
      - '.github/workflows/release-shelly-device-manager.yml'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump APP_VERSION (takes precedence; cannot be combined with version).'
        required: false
        type: choice
        default: 'none'
        options:
          - none
          - patch
          - minor
          - major
      version:
        description: 'Override version (e.g., 1.0.42). Leave blank to use APP_VERSION from source. Cannot combine with bump.'
        required: false
        type: string

jobs:
  release:
    name: Release Shelly Device Manager
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git log changelog range and tag resolution

      - name: Determine version (bump, override, or extract from source)
        id: version
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.version }}
          BUMP: ${{ github.event.inputs.bump }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$OVERRIDE_VERSION" ] && [ -n "$BUMP" ] && [ "$BUMP" != "none" ]; then
            echo "ERROR: Cannot set both 'bump' and 'version'. Choose one."
            exit 1
          fi

          if [ -n "$BUMP" ] && [ "$BUMP" != "none" ]; then
            CURRENT=$(grep -m 1 '@Field.*APP_VERSION' Apps/ShellyDeviceManager.groovy \
              | sed -n 's/.*APP_VERSION *= *"\([0-9.]*\)".*/\1/p')

            if [ -z "$CURRENT" ]; then
              echo "ERROR: Could not extract APP_VERSION from source"
              exit 1
            fi

            MAJOR=$(printf '%s' "$CURRENT" | cut -d. -f1)
            MINOR=$(printf '%s' "$CURRENT" | cut -d. -f2)
            PATCH=$(printf '%s' "$CURRENT" | cut -d. -f3)

            case "$BUMP" in
              patch) PATCH=$((PATCH + 1)) ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              *)     echo "ERROR: Invalid bump value '$BUMP'"; exit 1 ;;
            esac

            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "Bumping APP_VERSION from ${CURRENT} to ${VERSION} (${BUMP})"
          elif [ -n "$OVERRIDE_VERSION" ]; then
            if ! printf '%s' "$OVERRIDE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: Manual version '$OVERRIDE_VERSION' must be in format X.Y.Z"
              exit 1
            fi
            VERSION="$OVERRIDE_VERSION"
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "Using manual version override: $VERSION"
          else
            VERSION=$(grep -m 1 '@Field.*APP_VERSION' Apps/ShellyDeviceManager.groovy \
              | sed -n 's/.*APP_VERSION *= *"\([0-9.]*\)".*/\1/p')

            if [ -z "$VERSION" ]; then
              echo "ERROR: Could not extract APP_VERSION from source"
              exit 1
            fi

            # On push events: if the version in source has already been released, auto-bump
            # the patch number until we find an unused tag. This guarantees that every push
            # to master that touches the app or its drivers produces a new patch release,
            # even when the author didn't manually bump APP_VERSION before pushing.
            if [ "$EVENT_NAME" = "push" ] && git rev-parse --verify --quiet "refs/tags/app-v${VERSION}" >/dev/null; then
              ORIGINAL="$VERSION"
              MAJOR=$(printf '%s' "$VERSION" | cut -d. -f1)
              MINOR=$(printf '%s' "$VERSION" | cut -d. -f2)
              PATCH=$(printf '%s' "$VERSION" | cut -d. -f3)

              while : ; do
                PATCH=$((PATCH + 1))
                CANDIDATE="${MAJOR}.${MINOR}.${PATCH}"
                if ! git rev-parse --verify --quiet "refs/tags/app-v${CANDIDATE}" >/dev/null; then
                  VERSION="$CANDIDATE"
                  break
                fi
              done

              echo "override=true" >> "$GITHUB_OUTPUT"
              echo "Auto-bumping APP_VERSION from ${ORIGINAL} to ${VERSION} (push event; previous tag already released)"
            else
              echo "override=false" >> "$GITHUB_OUTPUT"
              echo "Using APP_VERSION from source: $VERSION"
            fi
          fi

          TAG="app-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION}, tag=${TAG}"

      - name: Apply version and update SHA-256 sidecar
        run: |
          # When manually overridden, rewrite the @Field APP_VERSION line first.
          # $VERSION and $OVERRIDE come from `env:` below (set from validated
          # workflow outputs); they are never inlined as ${{ }} into shell.
          if [ "$OVERRIDE" = "true" ]; then
            sed -i "s/\(@Field.*APP_VERSION *= *\)\"[0-9.]*\"/\1\"${VERSION}\"/" Apps/ShellyDeviceManager.groovy
          fi

          # Matches exactly 4-space-indented 'version:' with a quoted numeric value — targets definition() only
          sed -i "s/\(    version: \)\"[0-9.]*\"/\1\"${VERSION}\"/" Apps/ShellyDeviceManager.groovy

          # Compute SHA-256 of the (possibly version-updated) source file and
          # write a sidecar in standard `sha256sum` format ("<hex>  <path>").
          # The app's auto-update verifier downloads this sidecar from
          # raw.githubusercontent.com at the same tag, splits on whitespace,
          # and compares the first token to the SHA-256 of the source it just
          # downloaded. A mismatch aborts install, preventing tampered or
          # truncated payloads from being applied via /app/ajax/update.
          sha256sum Apps/ShellyDeviceManager.groovy > Apps/ShellyDeviceManager.groovy.sha256

          # Stage both files. The cached-diff check below covers both new and
          # modified paths (untracked files don't show in `git diff` until
          # they are added to the index).
          git add Apps/ShellyDeviceManager.groovy Apps/ShellyDeviceManager.groovy.sha256

          if git diff --cached --quiet -- Apps/ShellyDeviceManager.groovy Apps/ShellyDeviceManager.groovy.sha256; then
            echo "Source and SHA-256 sidecar already up to date for version ${VERSION}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if [ "$OVERRIDE" = "true" ]; then
              git commit -m "chore: bump APP_VERSION to ${VERSION} + refresh SHA-256 [skip ci]"
              echo "Committed APP_VERSION bump to ${VERSION} and SHA-256 sidecar"
            else
              git commit -m "chore: sync definition() version to ${VERSION} + refresh SHA-256 [skip ci]"
              echo "Committed definition() version sync and SHA-256 sidecar"
            fi
            git push
          fi
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OVERRIDE: ${{ steps.version.outputs.override }}

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} does not exist, will create"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Find the previous app release tag
          PREV_TAG=$(git tag -l "app-v*" --sort=-v:refname | head -n 1)

          # Exclude automated sync commits from the changelog
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges \
              --invert-grep --grep="^chore: sync definition" --grep="^chore: bump APP_VERSION" -- \
              Apps/ShellyDeviceManager.groovy Scripts/ UniversalDrivers/component_driver.json \
              || echo "- Release ${VERSION}")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20 \
              --invert-grep --grep="^chore: sync definition" --grep="^chore: bump APP_VERSION" -- \
              Apps/ShellyDeviceManager.groovy Scripts/ UniversalDrivers/component_driver.json \
              || echo "- Release ${VERSION}")
          fi

          {
            echo "## Shelly Device Manager ${VERSION}"
            echo ""
            echo "### Changes"
            echo "${CHANGELOG}"
            echo ""
            echo "### Installation"
            echo "- Import the app code into Hubitat Apps Code"
            echo "- Or update automatically if auto-update is enabled in the app"
          } > changelog.md

          echo "Release notes generated"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # No --target: release tags HEAD which includes the sync commit (if any).
          # Both the source file and its SHA-256 sidecar are uploaded as release
          # assets so the integrity-verified URL pattern works for either fetch
          # mechanism (raw.githubusercontent.com OR releases/download/...).
          gh release create "$TAG" \
            --title "Shelly Device Manager ${VERSION}" \
            --notes-file changelog.md \
            Apps/ShellyDeviceManager.groovy \
            Apps/ShellyDeviceManager.groovy.sha256

          echo "Release ${TAG} created with source + SHA-256 sidecar"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          EXISTS="${{ steps.check.outputs.exists }}"

          if [ "$EXISTS" == "true" ]; then
            echo "# Release ${TAG} already exists — no action taken" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Shelly Device Manager ${VERSION}"
              echo ""
              echo "**Tag:** ${TAG}"
              echo ""
              echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${TAG})"
            } >> "$GITHUB_STEP_SUMMARY"
          fi